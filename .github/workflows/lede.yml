name: lede-build

on:
  workflow_dispatch:
  repository_dispatch:
    types:
      - lede-build

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: "ubuntu-24.04"

    env:
      DEBIAN_FRONTEND: noninteractive
      build_date: ""
      distrib_revision: ""
      build_success: ""
      workdir_host: ""
      wrtdir: ""

    steps:
    - if: github.event.repository.owner.id == github.event.sender.id
      name: 显示系统信息
      run: |
        echo -e "💬 Server information \n"
        echo -e "💻 Server running on Ubuntu: [ Release: $(cat /etc/os-release | grep VERSION_CODENAME | cut -d '=' -f2) / Host: $(arch) ] \n"
        echo -e "🧮 Server CPU configuration information: \n$(cat /proc/cpuinfo | grep name | cut -f2 -d: | uniq -c) \n"
        echo -e "💾 Server memory usage: \n$(free -h) \n"
        echo -e "🗃️ Server space usag: \n$(df -hT ${{ github.workspace }}) \n"

    - name: 准备可用空间
      uses: AdityaGarg8/remove-unwanted-software@v5
      with:
        remove-dotnet: "true"
        remove-android: "true"
        remove-haskell: "true"
        remove-codeql: "true"
        remove-docker-images: "true"
        remove-large-packages: "true"
        remove-cached-tools: "true"
        remove-swapfile: "true"

    - name: 检出代码
      uses: actions/checkout@v6

    - name: 准备容器 ( init.sh )
      run: bash prepare/init.sh

    - name: 准备环境 ( prepare.sh )
      run: d "cd ${ffdir} && bash prepare/lede/prepare.sh"

    - name: 准备编译
      run: |
        d '
          cd ${wrtdir}
          p "展开配置"
          cp ${ffdir}/prepare/lede/config.seed .config
          make defconfig

          p "压缩编译目录"
          cd ${workdir}
          cp -r ${ffdir} ${wrtdir}/
          tar -cf - $(basename ${wrtdir})/ | zstd -19 -T0 > wrt_end.tar.zst
          rm -rf ${wrtdir}/$(basename ${ffdir})
        '

    - name: 上传编译目录
      uses: actions/upload-artifact@main
      with:
        name: wrt_end.tar.zst
        path: "${{ env.workdir_host }}/wrt_end.tar.zst"
        compression-level: 0

    - name: 缓存
      uses: HiGarfield/cachewrtbuild@main
      with:
        mixkey: lede
        prefix: ${{ env.workdir_host }}/openwrt

    - name: 开始编译 lede
      run: |
        d '
          cd ${wrtdir}
          p "开始下载"
          make download -j$(($(nproc) + 1))
          p "开始编译"
          make -j$(($(nproc) + 1))
          if [ $? -ne 0 ]; then
            p "！！编译失败！！开启单线程"
            . set_env build_success "false"
            make -j1 V=s
          else
            p "编译成功"
            . set_env build_success "true"
          fi

          p "打包日志"
          tar -cf - logs/ | zstd -19 -T0 > "${workdir}/logs_lede.tar.zst"

          [ "${build_success}" == "false" ] && exit 1
        '

        p "打印剩余空间"
        df -h

    - name: 上传日志文件
      uses: actions/upload-artifact@main
      with:
        name: logs_lede.tar.zst
        path: "${{ env.workdir_host }}/logs_lede.tar.zst"
        compression-level: 0

    - if: env.build_success == 'true'
      name: 整理文件
      run: |
        d '
          p "将原始固件移动到工作目录"
          rm -rf ./artifact/
          mkdir -p ./artifact/
          mv ${wrtdir}/bin/targets/amlogic/mesongx/*sysupgrade.img* ./artifact/
          mv ${wrtdir}/bin/targets/amlogic/mesongx/packages ./artifact/

          p "重新打包固件"
          cd ./artifact/
          7z -a -tzip N1-LEDE-${distrib_revision}-${build_date}-sfs.zip *n1*squashfs*
          7z -a -tzip N1-LEDE-${distrib_revision}-${build_date}-ext4.zip *n1*ext4*
          7z -a -r -tzip N1-LEDE-${distrib_revision}-${build_date}-packages.zip packages/
        '

        p "打印剩余空间"
        df -h

    - if: env.build_success == 'true'
      name: 上传固件
      uses: actions/upload-artifact@main
      with:
        name: lede_firmware
        path: "${{ env.workdir_host }}/artifact/*.zip"
