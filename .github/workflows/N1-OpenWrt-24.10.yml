name: N1-OpenWrt-24.10

on:
  workflow_dispatch:
  repository_dispatch:
    types:
      - N1-OpenWrt-24.10

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: "ubuntu-24.04"

    env:
      DEBIAN_FRONTEND: noninteractive
      build_date: ""
      latest_release: ""
      build_success: ""
      workdir_host: ""
      wrtdir: ""

    steps:
    - if: github.event.repository.owner.id == github.event.sender.id
      name: 显示系统信息
      run: |
        echo -e "💬 Server information \n"
        echo -e "💻 Server running on Ubuntu: [ Release: $(cat /etc/os-release | grep VERSION_CODENAME | cut -d '=' -f2) / Host: $(arch) ] \n"
        echo -e "🧮 Server CPU configuration information: \n$(cat /proc/cpuinfo | grep name | cut -f2 -d: | uniq -c) \n"
        echo -e "💾 Server memory usage: \n$(free -h) \n"
        echo -e "🗃️ Server space usag: \n$(df -hT ${{ github.workspace }}) \n"

    - name: 准备可用空间
      uses: AdityaGarg8/remove-unwanted-software@v5
      with:
        remove-dotnet: "true"
        remove-android: "true"
        remove-haskell: "true"
        remove-codeql: "true"
        remove-docker-images: "true"
        remove-large-packages: "true"
        remove-cached-tools: "true"
        remove-swapfile: "true"

    - name: 检出代码
      uses: actions/checkout@v6

    - name: 准备容器 ( init.sh )
      run: bash prepare/init.sh

    - name: 准备环境 ( prepare.sh )
      run: |
        d '
          cd ${ffdir} && bash scripts/openwrt-24.10/prepare.sh
          p "处理菜单"
          cd ${wrtdir} && bash ${ffdir}/prepare/menu.sh
        '

    - name: 准备编译
      run: |
        d '
          cd ${wrtdir}
          p "展开配置"
          cp ${ffdir}/scripts/openwrt-24.10/config.seed .config
          make defconfig

          p "压缩编译目录"
          cd ${workdir}
          cp -r ${ffdir} ${wrtdir}/
          tar -cf - $(basename ${wrtdir})/ | zstd -19 -T0 > wrt_end.tar.zst
          rm -rf ${wrtdir}/$(basename ${ffdir})
        '

    - name: 上传编译目录
      uses: actions/upload-artifact@main
      with:
        name: wrt_end.tar.zst
        path: "${{ env.workdir_host }}/wrt_end.tar.zst"
        compression-level: 0

    - name: 缓存
      uses: HiGarfield/cachewrtbuild@main
      with:
        mixkey: openwrt-24.10
        prefix: ${{ env.workdir_host }}/openwrt

    - name: 开始编译 openwrt
      run: |
        d '
          cd ${wrtdir}
          p "开始下载"
          make download -j$(($(nproc) + 1))
          p "开始编译"
          make -j$(($(nproc) + 1))
          if [ $? -ne 0 ]; then
            p "！！编译失败！！开启单线程"
            make -j1 V=s
          else
            p "编译成功"
            . set_env build_success "true"
          fi

          p "打包日志"
          tar -cf - logs/ | zstd -19 -T0 > "${workdir}/logs_imm24.tar.zst"

          if [ "${build_success}" == "true" ]; then
            p ">>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>"
          else
            exit 1
          fi
        '

        p "打印剩余空间"
        df -h

    - name: 上传日志文件
      uses: actions/upload-artifact@main
      with:
        name: logs_openwrt-24.10.tar.zst
        path: "${{ env.workdir_host }}/logs_openwrt-24.10.tar.zst"
        compression-level: 0

    - name: 打包固件
      uses: ffuqiangg/amlogic-s9xxx-openwrt@main
      with:
        openwrt_path: ${{ env.workdir_host }}/openwrt/bin/targets/*/*/*rootfs.tar.gz
        openwrt_board: s905d
        kernel_repo: ffuqiangg/kernel_${{ env.current_version }}.y
        openwrt_kernel: ${{ env.kernel_version }}
        kernel_usage: stable
        auto_kernel: false
        openwrt_size: 820
        openwrt_ip: 192.168.1.99
        build_date: ${{ env.build_date }}


    - if: env.build_success == 'true'
      name: 整理文件
      run: |
        d '
          p "将原始固件移动到工作目录"
          rm -rf ./artifact/
          mkdir -p ./artifact/
          cp ${{ env.PACKAGED_OUTPUTPATH }}/*.img.gz ./artifact/

          p "重新打包固件"
          cd ./artifact/
          7z a -tzip N1-OpenWrt-${{ env.latest_release }}-${{ env.build_date }}.zip *.img.gz
        '

        p "打印剩余空间"
        df -h

    - if: env.build_success == 'true'
      name: 上传固件
      uses: actions/upload-artifact@main
      with:
        name: openwrt_firmware.zip
        path: "${{ env.workdir_host }}/artifact/*.zip"
        compression-level: 0

    - if: github.event_name == 'repository_dispatch' && env.build_success == 'true'
      name: Upload firmware to release
      uses: ncipollo/release-action@main
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag: ${{ env.build_date }}
        allowUpdates: true
        replacesArtifacts: true
        artifacts: ./artifact/*.zip
        bodyFile: ./doc/release.md

    - if: github.event_name == 'repository_dispatch' && env.build_success == 'true'
      name: telegram notification
      run: |
        firmware_num=$(curl -fsSL https://github.com/ffuqiangg/build_openwrt/releases/expanded_assets/${{ env.build_date }} | \
          grep -oE "N1-.*.zip" | sort -u | wc -l)
        MSG="
        *${{ env.build_date }}* 固件编译完成
        https://github.com/ffuqiangg/build\_openwrt/releases/tag/${{ env.build_date }}
        "
        if [ "${firmware_num}" == '9' ]; then
          curl "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_TO }}&text=${MSG}&parse_mode=MarkDown&disable_web_page_preview=false"
        fi
