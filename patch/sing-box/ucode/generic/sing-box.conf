
config sing-box 'main'
	# Docs: https://github.com/ffuqiangg/build_openwrt/blob/main/doc/sing-box.md
	option enabled '0'
	option workdir '/etc/sing-box'
	option fuck_quic '1'
	option common_ports '0'
	option pass_cn_ip '0'

config sing-box 'profile'
	list prefix '[provider1] '
	list conf ''
	list prefix '[provider2] '
	list conf ''
	option restart_cron '0 5 * * *'

config sing-box 'basic'
	option log_level 'warn'
	option log_file '/var/log/sing-box.log'
	option external_controller_port '9900'
	option secret 'ffuqiangg'
	option ui_name 'zashboard'
	option store_rdrc '1'
	option tproxy_port '10105'
	option mixed_port '2881'
	option dns_port '2053'
	option redirect_port '2331'

config sing-box 'advanced'
	option enabled '1'
	option main_dns_type 'https'
	option main_dns_server 'dns.google'
	option china_dns_type 'h3'
	option china_dns_server '223.5.5.5'
	option ad_ruleset 'https://testingcf.jsdelivr.net/gh/ffuqiangg/sing-box-adsruleset@main/rule/adguard-dns-filter.srs'
	option nodes_filter '流量,套餐,重置,官網,官网,群组,建议'
	option area '香港,日本,新加坡,美国'
	option bypass 'YouTube,Google,Telegram,NETFLIX'
